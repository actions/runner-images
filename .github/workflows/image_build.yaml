name: Image Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        type: boolean
        description: "Create AMI"
        required: true
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ami-build:
    permissions:
      id-token: write
      contents: read
    if: github.event.inputs.image == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-east-2, ap-southeast-5]
    defaults:
      run:
        working-directory: ./images/ubuntu/templates
    steps:
      - uses: actions/checkout@v4

      - name: Setup `packer`
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: latest

      - name: Run `packer init`
        id: init
        run: "packer init ."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::560610306577:role/github-actions-role
          role-session-name: github-actions-role-session
          role-duration-seconds: 10800

      - name: Run `packer build`
        id: build
        env:
          AWS_MAX_ATTEMPTS: 240
          AWS_POLL_DELAY_SECONDS: 30
        run: packer build -var "region=${{ matrix.region }}" -only="ubuntu-22_04.amazon-ebs.build_image" -var=image_os=ubuntu22 .
